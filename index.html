<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>恋愛診断</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <h1 id="app-title" class="title">恋愛診断</h1>
      <p id="app-subtitle" class="subtitle">気になる恋をチェックしよう</p>

      <div id="start-screen" class="screen active">
        <p class="description">
          診断したいメニューを選んでください。<br />
          気になる相手との関係や、今の恋の状態をもとにチェックできます。
        </p>

        <div class="menu-list" id="menu-list"></div>
      </div>

      <div id="quiz-screen" class="screen">
        <div class="progress-wrap">
          <p id="quiz-label" class="quiz-label"></p>
          <p id="question-number" class="question-number"></p>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <h2 id="question-text" class="question-text"></h2>
        <div id="choices" class="choices"></div>
      </div>

      <div id="result-screen" class="screen">
        <p class="result-label">診断結果</p>
        <p id="result-diagnosis-name" class="result-diagnosis-name"></p>
        <h2 id="result-title" class="result-title"></h2>
        <p id="result-score" class="result-score"></p>
        <p id="result-text" class="result-text"></p>
        <p id="result-advice" class="result-advice"></p>
        <button id="share-btn" class="share-btn">結果をシェアする</button>
        <button id="restart-btn" class="main-btn">別の診断をする</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
