<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>彼は脈あり？診断</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <h1 class="title">彼は脈あり？診断</h1>
      <p class="subtitle">10の質問で彼の本音をチェック</p>

      <!-- スタート画面 -->
      <div id="start-screen" class="screen active">
        <p class="description">
          気になる相手とのLINEや態度をもとに、
          脈あり度を診断します。
        </p>
        <button id="start-btn" class="main-btn">診断スタート</button>
      </div>

      <!-- 質問画面 -->
      <div id="quiz-screen" class="screen">
        <p id="question-number" class="question-number"></p>
        <h2 id="question-text" class="question-text"></h2>
        <div id="choices" class="choices"></div>
      </div>

      <!-- 結果画面 -->
      <div id="result-screen" class="screen">
        <p class="result-label">診断結果</p>
        <h2 id="result-title" class="result-title"></h2>
        <p id="result-score" class="result-score"></p>
        <p id="result-text" class="result-text"></p>
        <p id="result-advice" class="result-advice"></p>
        <button id="share-btn" class="share-btn">結果をシェアする</button>
        <button id="restart-btn" class="main-btn">もう一度診断する</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
